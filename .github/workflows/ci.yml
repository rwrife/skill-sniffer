name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke-test CLI (--version)
        run: node bin/skill-sniffer --version

      - name: Smoke-test Action runner (no PR context)
        # The composite action's entry point. With no PR event in scope it
        # should degrade gracefully ("nothing to sniff") and exit 0, proving
        # the built dist/action/* loads and the bin wiring is intact.
        env:
          GITHUB_REPOSITORY: rwrife/skill-sniffer
          INPUT_COMMENT: "false"
        run: node bin/skill-sniffer-action
